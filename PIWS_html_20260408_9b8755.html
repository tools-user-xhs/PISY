<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>外贸PI智能生成器 - 专业版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', 'Roboto', 'Times New Roman', serif;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1500px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            overflow: hidden;
            padding: 20px 28px 32px;
        }

        .info-banner {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f2b3d 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            font-weight: 500;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 24px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
        }
        h1 {
            font-size: 1.8rem;
            color: #1e293b;
        }
        .lang-switch {
            display: flex;
            gap: 12px;
        }
        .lang-btn {
            background: #f1f5f9;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
        }
        .lang-btn.active {
            background: #1e3a5f;
            color: white;
        }

        .main-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        .control-panel {
            flex: 1.3;
            min-width: 360px;
            background: #f8fafc;
            border-radius: 20px;
            padding: 24px;
        }
        .preview-panel {
            flex: 2;
            min-width: 520px;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 20px 0 12px 0;
            color: #0f2b3d;
            border-left: 4px solid #f97316;
            padding-left: 12px;
        }

        .upload-area {
            background: #ffffff;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 16px;
        }
        .upload-area:hover {
            background: #fef9e6;
            border-color: #f97316;
        }
        .file-input-hidden {
            display: none;
        }
        .supported-formats {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 8px;
            background: #f1f5f9;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .form-row {
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .form-row label {
            width: 100px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
        }
        .form-row input, .form-row textarea {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.85rem;
            font-family: inherit;
        }

        .item-row {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            transition: 0.2s;
        }
        .item-main {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .item-main input {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }
        .item-desc { flex: 2; min-width: 150px; }
        .item-qty { flex: 0.8; min-width: 80px; }
        .item-price { flex: 1; min-width: 100px; }
        .item-amount { flex: 1; background: #f1f5f9; font-weight: bold; text-align: center; padding: 8px; border-radius: 8px; min-width: 100px; }
        
        .item-image-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed #e2e8f0;
        }
        .image-preview {
            width: 50px;
            height: 50px;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #cbd5e1;
        }
        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        .image-preview span {
            font-size: 20px;
            color: #94a3b8;
        }
        .upload-img-btn {
            background: #e2e8f0;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .remove-img-btn {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .btn-icon {
            background: #fee2e2;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            color: #dc2626;
            font-weight: bold;
        }
        .btn-add {
            background: #e2e8f0;
            margin-top: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin: 25px 0 15px;
            flex-wrap: wrap;
        }
        .primary-btn {
            background: #f97316;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .print-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
        }

        .pi-preview {
            background: white;
            padding: 28px 32px;
            font-family: 'Times New Roman', '宋体', 'SimSun', serif;
            font-size: 11pt;
            line-height: 1.5;
            border: 1px solid #ccc;
        }
        .pi-main-title {
            font-size: 24pt;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .pi-sub-title {
            text-align: center;
            font-size: 10pt;
            margin-bottom: 20px;
            color: #4a5568;
            border-bottom: 2px solid #2d3748;
            padding-bottom: 8px;
        }
        .seller-buyer-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
        }
        .info-box { width: 48%; }
        .info-box-title {
            font-weight: bold;
            background: #f8fafc;
            padding: 6px 10px;
            border-left: 3px solid #f97316;
            margin-bottom: 8px;
        }
        .info-box-content {
            padding: 4px 10px;
            font-size: 10pt;
        }
        .pi-details-grid {
            display: flex;
            justify-content: space-between;
            background: #fef9e6;
            padding: 12px 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .pi-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .pi-table th, .pi-table td {
            border: 1px solid #222;
            padding: 8px 10px;
            vertical-align: middle;
        }
        .pi-table th { background: #f8fafc; text-align: center; font-weight: 700; }
        .amount-right { text-align: right; }
        .total-row { background: #fef9e6; font-weight: bold; }
        .payment-info {
            margin: 15px 0;
            padding: 12px;
            background: #f1f5f9;
            border-left: 4px solid #f97316;
        }
        .terms-box {
            margin: 15px 0;
            padding: 10px;
            background: #fafaf5;
            border: 1px solid #e2e8f0;
            font-size: 9.5pt;
        }
        .terms-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #2d3748;
        }
        .signature-section {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed #999;
        }
        .footer-note {
            margin-top: 15px;
            text-align: center;
            font-size: 8pt;
            color: #666;
        }

        @media print {
            body * { visibility: hidden; }
            .preview-panel, .preview-panel * { visibility: visible; }
            .preview-panel { position: absolute; top: 0; left: 0; width: 100%; }
            .control-panel, .info-banner, .header-bar, .action-buttons { display: none; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="info-banner">
        <span>📄 专业形式发票生成器 · 支持图片上传/打印</span>
        <span style="background: rgba(255,255,255,0.2); padding: 4px 16px; border-radius: 40px;">⚙️ 全功能版本</span>
    </div>

    <div class="header-bar">
        <h1 id="mainTitle">📄 Proforma Invoice Generator</h1>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">English</button>
            <button class="lang-btn" data-lang="zh">中文</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="control-panel">
            <div class="upload-area" id="uploadZone">
                <input type="file" id="fileUpload" accept=".txt,.csv" class="file-input-hidden" />
                <label for="fileUpload" style="cursor:pointer; display:block;">
                    📂 点击上传 PI 文件<br>
                    <span style="font-size:12px;">支持 TXT / CSV 格式</span>
                </label>
                <div class="supported-formats">📎 支持格式: TXT, CSV (自动提取关键信息)</div>
            </div>

            <div class="section-title">✏️ 编辑关键信息</div>
            <div class="form-row"><label>卖方 / Seller:</label><input type="text" id="sellerName" value="Guangzhou Sunrise Electronics Co., Ltd."></div>
            <div class="form-row"><label>卖方地址:</label><input type="text" id="sellerAddr" value="No.88 Trade Road, Ningbo, China | Tel: +86 574 8888 6666"></div>
            <div class="form-row"><label>买方 / Buyer:</label><input type="text" id="buyerName" value="London Digital Solutions Ltd."></div>
            <div class="form-row"><label>买方地址:</label><input type="text" id="buyerAddr" value="22 Commerce Street, London, UK | VAT: GB123456789"></div>
            <div class="form-row"><label>PI No.:</label><input type="text" id="invoiceNo" value="PI-2025-088"></div>
            <div class="form-row"><label>Date:</label><input type="text" id="invoiceDate" value="2025-03-28"></div>
            <div class="form-row"><label>付款条件:</label><input type="text" id="paymentTerm" value="T/T 30% Deposit, Balance before shipment"></div>
            
            <div class="form-row"><label>贸易术语:</label><input type="text" id="incoterm" value="FOB Ningbo"></div>
            <div class="form-row"><label>装运港/Port of Loading:</label><input type="text" id="portLoading" value="Ningbo Port, China"></div>
            <div class="form-row"><label>目的港/Port of Discharge:</label><input type="text" id="portDischarge" value="Felixstowe Port, UK"></div>
            <div class="form-row"><label>最迟装运日:</label><input type="text" id="latestShipment" value="May 25, 2025"></div>
            
            <div class="section-title">📦 产品明细 (可上传图片)</div>
            <div id="itemsContainer"></div>
            <button class="btn-add" id="addItemBtn">+ 添加产品行</button>
            
            <div class="form-row"><label>备注/银行信息:</label><textarea id="remarks" rows="2">Please confirm PI and arrange deposit. Delivery within 25 days after deposit.
Beneficiary: Sunrise Electronics, Account: 1234567890, SWIFT: SZCNCNBJ</textarea></div>
            
            <div class="action-buttons">
                <button class="primary-btn" id="genBtn">✨ 生成PI</button>
                <button class="print-btn" id="printBtn">🖨️ 打印</button>
            </div>
            <div class="info-note" style="font-size:12px; color:#64748b; margin-top:12px;">每项产品可上传图片，预览中会显示产品图片。支持导入CSV/TXT文件。</div>
        </div>

        <div class="preview-panel">
            <div id="piPreview" class="pi-preview">请点击"生成PI"预览专业形式发票</div>
        </div>
    </div>
</div>

<script>
    // ==================== 全功能无试用限制 ====================
    
    let currentLang = 'en';
    let itemsData = [
        { desc: "Bluetooth 5.0 Headphones", qty: 500, price: 18.50, amount: 9250.00, imageUrl: null },
        { desc: "Wireless Charging Pad", qty: 300, price: 12.80, amount: 3840.00, imageUrl: null },
        { desc: "USB-C Cable 2m", qty: 1000, price: 2.50, amount: 2500.00, imageUrl: null },
        { desc: "Smart Watch Band", qty: 200, price: 8.90, amount: 1780.00, imageUrl: null }
    ];

    // DOM 元素
    const sellerName = document.getElementById('sellerName');
    const sellerAddr = document.getElementById('sellerAddr');
    const buyerName = document.getElementById('buyerName');
    const buyerAddr = document.getElementById('buyerAddr');
    const invoiceNoInput = document.getElementById('invoiceNo');
    const dateInput = document.getElementById('invoiceDate');
    const paymentTermInput = document.getElementById('paymentTerm');
    const incotermInput = document.getElementById('incoterm');
    const portLoadingInput = document.getElementById('portLoading');
    const portDischargeInput = document.getElementById('portDischarge');
    const latestShipmentInput = document.getElementById('latestShipment');
    const remarksText = document.getElementById('remarks');
    const itemsContainer = document.getElementById('itemsContainer');
    const addItemBtn = document.getElementById('addItemBtn');
    const genBtn = document.getElementById('genBtn');
    const printBtn = document.getElementById('printBtn');
    const piPreviewDiv = document.getElementById('piPreview');
    const fileUpload = document.getElementById('fileUpload');

    function renderItemsInputs() {
        itemsContainer.innerHTML = '';
        itemsData.forEach((item, idx) => {
            const row = document.createElement('div'); row.className = 'item-row';
            const mainDiv = document.createElement('div'); mainDiv.className = 'item-main';
            const descInput = document.createElement('input'); descInput.type = 'text'; descInput.value = item.desc; descInput.className = 'item-desc';
            descInput.placeholder = "产品名称 / Product Name";
            descInput.addEventListener('change', (e) => { itemsData[idx].desc = e.target.value; updateAmount(idx); renderPreview(); });
            const qtyInput = document.createElement('input'); qtyInput.type = 'number'; qtyInput.step = '1'; qtyInput.value = item.qty; qtyInput.className = 'item-qty';
            qtyInput.placeholder = "数量 / Qty";
            qtyInput.addEventListener('change', (e) => { itemsData[idx].qty = parseFloat(e.target.value) || 0; updateAmount(idx); renderPreview(); });
            const priceInput = document.createElement('input'); priceInput.type = 'number'; priceInput.step = '0.01'; priceInput.value = item.price; priceInput.className = 'item-price';
            priceInput.placeholder = "单价 / Unit Price";
            priceInput.addEventListener('change', (e) => { itemsData[idx].price = parseFloat(e.target.value) || 0; updateAmount(idx); renderPreview(); });
            const amountSpan = document.createElement('span'); amountSpan.className = 'item-amount'; amountSpan.innerText = item.amount.toFixed(2);
            const delBtn = document.createElement('button'); delBtn.innerText = '删除'; delBtn.className = 'btn-icon';
            delBtn.addEventListener('click', () => { itemsData.splice(idx,1); renderItemsInputs(); renderPreview(); });
            mainDiv.append(descInput, qtyInput, priceInput, amountSpan, delBtn);
            const imgDiv = document.createElement('div'); imgDiv.className = 'item-image-section';
            const previewDiv = document.createElement('div'); previewDiv.className = 'image-preview';
            if(item.imageUrl) {
                const img = document.createElement('img'); img.src = item.imageUrl; img.style.maxWidth = '100%'; img.style.maxHeight = '100%';
                previewDiv.appendChild(img);
            } else {
                const span = document.createElement('span'); span.innerText = '📷'; span.style.fontSize = '24px';
                previewDiv.appendChild(span);
            }
            const uploadBtn = document.createElement('button'); uploadBtn.innerText = '上传图片'; uploadBtn.className = 'upload-img-btn';
            const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        itemsData[idx].imageUrl = ev.target.result;
                        renderItemsInputs();
                        renderPreview();
                    };
                    reader.readAsDataURL(file);
                }
            });
            const removeImgBtn = document.createElement('button'); removeImgBtn.innerText = '移除图片'; removeImgBtn.className = 'remove-img-btn';
            removeImgBtn.addEventListener('click', () => {
                itemsData[idx].imageUrl = null;
                renderItemsInputs();
                renderPreview();
            });
            imgDiv.append(previewDiv, uploadBtn, fileInput, removeImgBtn);
            row.append(mainDiv, imgDiv);
            itemsContainer.appendChild(row);
        });
    }
    
    function updateAmount(idx) { itemsData[idx].amount = (itemsData[idx].qty || 0) * (itemsData[idx].price || 0); }

    // 生成 PI 预览内容
    function renderPreview() {
        itemsData.forEach((_,i) => updateAmount(i));
        const subtotal = itemsData.reduce((s,i) => s + (i.amount || 0), 0);
        const seller = sellerName.value.trim() || "SELLER COMPANY";
        const sellerAddrText = sellerAddr.value.trim() || "";
        const buyer = buyerName.value.trim() || "BUYER COMPANY";
        const buyerAddrText = buyerAddr.value.trim() || "";
        const invoiceNo = invoiceNoInput.value.trim() || "PI-2025-088";
        const invDate = dateInput.value.trim() || new Date().toISOString().slice(0,10);
        const paymentTerm = paymentTermInput.value.trim() || "T/T 30% Deposit";
        const incoterm = incotermInput.value.trim() || "FOB Ningbo";
        const portLoading = portLoadingInput.value.trim() || "Ningbo Port, China";
        const portDischarge = portDischargeInput.value.trim() || "Felixstowe Port, UK";
        const latestShipment = latestShipmentInput.value.trim() || "May 25, 2025";
        const remarks = remarksText.value;
        
        // 产品明细表格 - 表头使用中英文双语，图片列标题统一为"图片 / Picture"
        let itemsHtml = `<table class="pi-table"><thead>
            <tr>
                <th style="width:5%">No.<br>编号</th>
                <th style="width:38%">品名 (Description)</th>
                <th style="width:12%">图片 / Picture</th>
                <th style="width:10%">数量 / Qty</th>
                <th style="width:13%">单价(USD)<br>Unit Price</th>
                <th style="width:22%">总价(USD)<br>Total Amount</th>
            </tr>
            </thead><tbody>`;
        itemsData.forEach((item, idx) => {
            const imgHtml = item.imageUrl ? `<img src="${item.imageUrl}" style="max-width:50px; max-height:50px; object-fit:cover; border-radius:6px;">` : '<span style="color:#999;">—</span>';
            itemsHtml += `<tr>
                <td style="text-align:center;">${idx+1}</td>
                <td>${escapeHtml(item.desc)}</td>
                <td style="text-align:center;">${imgHtml}</td>
                <td class="amount-right">${item.qty}</td>
                <td class="amount-right">${item.price.toFixed(2)}</td>
                <td class="amount-right">${item.amount.toFixed(2)}</td>
            </tr>`;
        });
        itemsHtml += `<tr style="font-weight:bold; background:#f9f9f9;"><td colspan="5" style="text-align:right;">小计 (Subtotal) :</td><td class="amount-right">USD ${subtotal.toFixed(2)}</td></tr>`;
        itemsHtml += `<tr class="total-row"><td colspan="5" style="text-align:right; font-size:12pt;">总计 (TOTAL AMOUNT) :</td><td class="amount-right" style="font-weight:bold;">USD ${subtotal.toFixed(2)}</td></tr>`;
        itemsHtml += `</tbody>`;

        const bankInfo = remarks.includes("Beneficiary") ? remarks : `Beneficiary: ${seller.split(' ')[0]} Electronics, Account: 9876543210, SWIFT: ABCDCNSH`;
        
        piPreviewDiv.innerHTML = `
            <div class="pi-main-title">PROFORMA INVOICE</div>
            <div class="pi-sub-title">(This Proforma Invoice is legally binding upon buyer's confirmation)</div>
            <div class="seller-buyer-section">
                <div class="info-box"><div class="info-box-title">卖方 / SELLER</div><div class="info-box-content">${escapeHtml(seller)}<br>${escapeHtml(sellerAddrText)}</div></div>
                <div class="info-box"><div class="info-box-title">买方 / BUYER</div><div class="info-box-content">${escapeHtml(buyer)}<br>${escapeHtml(buyerAddrText)}</div></div>
            </div>
            <div class="pi-details-grid">
                <span><strong>形式发票号 (PI No.) :</strong> ${escapeHtml(invoiceNo)}</span>
                <span><strong>签发日期 (Date) :</strong> ${escapeHtml(invDate)}</span>
                <span><strong>贸易术语 (Incoterms) :</strong> ${escapeHtml(incoterm)}</span>
                <span><strong>付款方式 (Payment) :</strong> ${escapeHtml(paymentTerm)}</span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:12px; gap:12px; flex-wrap:wrap; background:#fafaf5; padding:8px 12px;">
                <span><strong>⛴️ 装运港 (Port of Loading):</strong> ${escapeHtml(portLoading)}</span>
                <span><strong>🚢 目的港 (Port of Discharge):</strong> ${escapeHtml(portDischarge)}</span>
                <span><strong>📅 最迟装运日 (Latest Shipment Date):</strong> ${escapeHtml(latestShipment)}</span>
            </div>
            ${itemsHtml}
            </table>
            <div class="payment-info">
                <strong>💰 银行信息 / 付款指示 (Banking & Payment Instructions) :</strong><br>${escapeHtml(bankInfo).replace(/\n/g,'<br>')}
            </div>
            <div class="terms-box">
                <div class="terms-title">📜 一般条款与条件 (Terms & Conditions):</div>
                <ul style="margin-left: 20px; font-size: 9pt;">
                    <li>1. This Proforma Invoice shall be considered as a binding order upon confirmation by both parties.</li>
                    <li>2. Payment Terms: 30% deposit to confirm production, 70% balance payment against copy of Bill of Lading.</li>
                    <li>3. Quality claims must be raised in writing within 15 days after receipt of goods, otherwise deemed accepted.</li>
                    <li>4. Force Majeure: Neither party shall be held liable for delay or non-delivery due to natural disasters, war, or other force majeure events.</li>
                    <li>5. Dispute Resolution: Any dispute shall be submitted to China International Economic and Trade Arbitration Commission (CIETAC) for arbitration.</li>
                    <li>6. All banking charges within beneficiary's country shall be borne by beneficiary; intermediary bank fees by remitter.</li>
                </ul>
            </div>
            <div class="signature-section">
                <div>______________________<br><strong>卖方授权签字 (Seller's Signature & Stamp)</strong></div>
                <div>______________________<br><strong>买方确认签字 (Buyer's Confirmation & Signature)</strong></div>
            </div>
            <div class="footer-note">
                <strong>声明 (Declaration) :</strong> This Proforma Invoice is legally binding upon buyer's acceptance. Please sign and return one copy. 请签署并回传一份副本。<br>
                Generated on ${new Date().toLocaleString()} · 电子文档与原件具有同等效力 (Electronic version has equal legal effect)
            </div>
        `;
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function handleGenerate() {
        renderPreview();
        const hintDiv = document.querySelector('.info-note');
        const originalHTML = hintDiv.innerHTML;
        hintDiv.style.color = "#10b981";
        hintDiv.style.fontWeight = "bold";
        hintDiv.innerHTML = currentLang === 'zh' ? '✅ 形式发票已生成！' : '✅ Proforma Invoice generated!';
        setTimeout(() => { 
            hintDiv.innerHTML = originalHTML; 
            hintDiv.style.color = ""; 
            hintDiv.style.fontWeight = "";
        }, 1800);
    }

    function printInvoice() {
        const previewElement = document.getElementById('piPreview');
        if (!previewElement.innerText.trim() || previewElement.innerText.includes("请点击")) {
            alert("请先点击「生成PI」按钮生成发票内容");
            return;
        }
        const printWindow = window.open('', '_blank', 'width=1000,height=800,scrollbars=yes');
        if (printWindow) {
            printWindow.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Proforma Invoice</title><style>');
            printWindow.document.write(`
                * { margin:0; padding:0; box-sizing:border-box; }
                body { font-family: 'Times New Roman', '宋体', SimSun, serif; padding: 15mm; }
                .pi-main-title { font-size: 24pt; font-weight: bold; text-align: center; margin-bottom: 10px; }
                .pi-sub-title { text-align: center; font-size: 10pt; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 6px; }
                .seller-buyer-section { display: flex; justify-content: space-between; margin-bottom: 20px; }
                .info-box { width: 48%; }
                .info-box-title { font-weight: bold; background: #f5f5f5; padding: 6px; border-left: 3px solid #f97316; }
                .pi-details-grid, .payment-info, .terms-box { margin: 12px 0; padding: 8px; }
                .pi-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                .pi-table th, .pi-table td { border: 1px solid #222; padding: 8px; text-align: left; }
                .pi-table th { background: #f0f0f0; text-align: center; }
                .amount-right { text-align: right; }
                .total-row { background: #fef9e6; font-weight: bold; }
                .signature-section { display: flex; justify-content: space-between; margin-top: 30px; padding-top: 20px; border-top: 1px dashed #999; }
                .footer-note { margin-top: 15px; text-align: center; font-size: 8pt; }
                @media print { body { padding: 0; margin: 0; } }
            `);
            printWindow.document.write('</style></head><body>');
            printWindow.document.write(previewElement.innerHTML);
            printWindow.document.write('</body></html>');
            printWindow.document.close();
            printWindow.onload = function() { printWindow.print(); };
        } else {
            alert("请允许弹出窗口，然后重试打印");
        }
    }

    function handleFileUpload(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const lines = content.split(/\r?\n/);
            let newItems = [];
            for(let line of lines) {
                if(line.match(/Seller:\s*(.+)/i)) sellerName.value = line.match(/Seller:\s*(.+)/i)[1].trim();
                if(line.match(/Buyer:\s*(.+)/i)) buyerName.value = line.match(/Buyer:\s*(.+)/i)[1].trim();
                if(line.match(/Invoice\s*No:\s*(.+)/i)) invoiceNoInput.value = line.match(/Invoice\s*No:\s*(.+)/i)[1].trim();
                if(line.match(/Date:\s*(.+)/i)) dateInput.value = line.match(/Date:\s*(.+)/i)[1].trim();
                if(line.match(/Payment\s*Term:\s*(.+)/i)) paymentTermInput.value = line.match(/Payment\s*Term:\s*(.+)/i)[1].trim();
                const commaMatch = line.match(/^([^,]+),(\d+(?:\.\d+)?),(\d+(?:\.\d+)?)/);
                if(commaMatch && !line.toLowerCase().includes('product') && !line.toLowerCase().includes('description')) {
                    const desc = commaMatch[1].trim();
                    const qty = parseFloat(commaMatch[2]);
                    const price = parseFloat(commaMatch[3]);
                    if(desc && !isNaN(qty) && !isNaN(price) && qty > 0) {
                        newItems.push({ desc, qty, price, amount: qty * price, imageUrl: null });
                    }
                }
            }
            if(newItems.length > 0) itemsData = newItems;
            renderItemsInputs();
            renderPreview();
            alert("文件导入成功！");
        };
        reader.readAsText(file, 'UTF-8');
    }

    addItemBtn.addEventListener('click', () => { itemsData.push({ desc: "New Product", qty: 1, price: 0, amount: 0, imageUrl: null }); renderItemsInputs(); renderPreview(); });
    genBtn.addEventListener('click', handleGenerate);
    printBtn.addEventListener('click', printInvoice);
    fileUpload.addEventListener('change', (e) => { if(e.target.files.length) handleFileUpload(e.target.files[0]); });
    document.getElementById('uploadZone').addEventListener('click', () => fileUpload.click());
    [sellerName, sellerAddr, buyerName, buyerAddr, invoiceNoInput, dateInput, paymentTermInput, incotermInput, portLoadingInput, portDischargeInput, latestShipmentInput, remarksText].forEach(inp => inp.addEventListener('input', () => renderPreview()));

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLang = btn.getAttribute('data-lang');
            const titles = { en: "📄 Proforma Invoice Generator", zh: "📄 形式发票智能生成器" };
            document.getElementById('mainTitle').innerText = titles[currentLang];
            renderPreview();
        });
    });

    renderItemsInputs();
    renderPreview();
</script>
